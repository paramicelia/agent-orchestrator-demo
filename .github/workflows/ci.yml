name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true

      - name: Pytest (unit + integration, excluding smoke-eval gate)
        env:
          GROQ_API_KEY: "test-key-not-used"
        run: pytest tests/ -v --ignore=tests/test_eval_smoke_ci.py

      # Gating step: runs the full eval framework end-to-end with mocked
      # Groq + a redirected results file. Validates dataset schema, judge
      # contract, and the results.json schema on every PR. No real Groq
      # quota is spent here — see tests/test_eval_smoke_ci.py docstring.
      - name: Smoke-eval gate
        env:
          GROQ_API_KEY: "test-key-not-used"
        run: pytest tests/test_eval_smoke_ci.py -v
