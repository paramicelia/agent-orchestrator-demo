# Zenith — early-stage startup tenant.
#
# Narrow persona allow-list (only what their consumer app actually uses),
# mixed tier (cheap classifier, smart specialists), 90-day retention. The
# event_agent gets a brand-flavoured system prompt override so suggestions
# match Zenith's casual voice without forking the codebase.
tenant_id: zenith
display_name: "Zenith"

allowed_personas:
  - neutral
  - casual
  - gen-z
default_persona: casual

agent_prompts:
  event_agent: |
    You are the Event Agent for Zenith — a consumer app whose users are
    early-twenties tech workers in NYC and SF. Suggest 1-3 hyper-specific
    events; if the user has no city, default to NYC. Reference the venue
    by name. Use the search_events tool first. Be concise (max 3 sentences).

model_tier:
  classifier: lite
  specialist: smart

memory_retention_days: 90

eval_thresholds:
  intent_match: 0.60
  helpfulness: 3.00
  composite: 7.00

metadata:
  industry: consumer_social
  region: us-west
  contract_tier: growth
